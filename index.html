<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#0e0c0b">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>For Fork's Sake</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body { height: 100%; overflow: hidden; }

body {
  background: #0e0c0b;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
}

/* ── Screen fills full viewport ── */
.screen {
  background: #0e0c0b;
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow: hidden;
}

/* ── Header ── */
.app-header {
  padding: 8px 18px 12px;
  background: #0e0c0b;
  border-bottom: 0.5px solid #504840;
  flex-shrink: 0;
}
.header-row { display: flex; justify-content: space-between; align-items: center; }
.app-title { font-size: 20px; font-weight: 500; color: #faf6f0; }
.week-label { font-size: 11px; color: #9c9288; margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 10px; margin-right: 4px; }
.nav-pill {
  display: flex; align-items: center;
  background: #343028; border: 0.5px solid #5e5650;
  border-radius: 99px; overflow: hidden;
}
.pill-btn {
  display: flex; align-items: center; justify-content: center;
  padding: 8px 13px; cursor: pointer;
}
.pill-btn svg { width: 18px; height: 18px; stroke: #E8622A; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.pill-btn.disabled { opacity: 0.3; pointer-events: none; }
.pill-divider { width: 0.5px; height: 22px; background: #5e5650; }
.more-btn { font-size: 20px; color: #9c9288; cursor: pointer; padding: 4px 2px; user-select: none; letter-spacing: 1px; line-height: 1; }

/* ── Planner ── */
.planner-body {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; padding: 10px 12px 8px; min-height: 0;
}
.week-row { display: grid; gap: 6px; flex: 1; min-height: 0; }
.row-top { grid-template-columns: repeat(4, minmax(0, 1fr)); padding-bottom: 10px; }
.row-bottom { grid-template-columns: repeat(3, minmax(0, 1fr)); padding-top: 10px; }
.divider-line { height: 1.5px; background: #504840; flex-shrink: 0; margin: 0 -12px; }
.day-col { display: flex; flex-direction: column; gap: 5px; min-width: 0; }

/* ── Day header tile ── */
.day-head {
  background: #343028; border: 1.5px solid #5e5650;
  border-radius: 10px; padding: 6px 4px 5px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  flex-shrink: 0;
}
.day-head.today { background: #E8622A; border-color: #E8622A; }
.day-lbl { font-size: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: #9c9288; }
.day-head.today .day-lbl { color: #fad4c2; }
.day-num { font-size: 15px; font-weight: 500; color: #ede4d8; line-height: 1; }
.day-head.today .day-num { color: #fff; }

/* ── Meal slots ── */
.slot {
  border-radius: 10px; border: 0.5px solid #504840;
  background: #2a261e;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 6px 4px; flex: 1; min-height: 0;
  overflow: hidden; gap: 3px; cursor: pointer;
  user-select: none; -webkit-user-select: none;
  transition: opacity 0.15s;
}
.slot:active { opacity: 0.75; }
.slot.empty {
  background: #282420;
  border: 0.5px dashed #504840;
}
.slot.stale { background: #2a1a15; border-color: #5a2a1a; }

.slot.filled-brekky { border-top: 2.5px solid #D4922A; }
.slot.filled-lunch   { border-top: 2.5px solid #4A8FA8; }
.slot.filled-dinner  { border-top: 2.5px solid #E8622A; }

.slot-type { font-size: 7px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; width: 100%; text-align: center; white-space: nowrap; overflow: hidden; }
.slot.filled-brekky .slot-type { color: #D4922A; }
.slot.filled-lunch .slot-type   { color: #4A8FA8; }
.slot.filled-dinner .slot-type  { color: #E8622A; }
.slot.stale .slot-type { color: #c0604a; }

.slot-emoji { font-size: 16px; line-height: 1; }
.slot-name { font-size: 7.5px; font-weight: 500; color: #ede4d8; text-align: center; width: 100%; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; padding: 0 2px; }
.slot.stale .slot-name { color: #c0604a; }
.empty-plus { font-size: 16px; color: #5e5650; line-height: 1; }

/* ── Pool section ── */
.pool-section {
  background: #111009;
  border-top: 1.5px solid #504840;
  padding: 10px 12px 0;
  flex-shrink: 0;
}
.pool-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.pool-title { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: #9c9288; }
.pool-add {
  width: 26px; height: 26px;
  background: #E8622A; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; user-select: none;
  transition: opacity 0.15s;
}
.pool-add:active { opacity: 0.75; }

.pool-scroll-wrap { overflow: hidden; }
.pool-scroll {
  display: flex; overflow-x: scroll;
  scroll-snap-type: x mandatory;
  scrollbar-width: none; -ms-overflow-style: none;
}
.pool-scroll::-webkit-scrollbar { display: none; }
.pool-page {
  display: flex; gap: 5px;
  flex-shrink: 0; scroll-snap-align: start;
  width: 100%;
}
.pool-item {
  flex: 1; min-width: 0;
  background: #343028; border: 1.5px solid #5e5650;
  border-radius: 12px; padding: 8px 4px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer; user-select: none;
  transition: opacity 0.15s;
}
.pool-item:active { opacity: 0.7; }
.pool-item.phantom { background: transparent; border-color: transparent; cursor: default; pointer-events: none; }
.pool-emoji { font-size: 20px; line-height: 1; }
.pool-name { font-size: 7.5px; font-weight: 500; color: #ede4d8; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; padding: 0 2px; }
.pool-serves { font-size: 9px; color: #E8622A; font-weight: 500; }

.pool-empty-msg { width: 100%; text-align: center; padding: 14px 0; font-size: 11px; color: #5e5650; }

.pool-dots { display: flex; justify-content: center; gap: 5px; padding: 8px 0 10px; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: #5e5650; }
.dot.active { background: #E8622A; }

/* ── Sheet overlay ── */
.sheet-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.65);
  z-index: 100;
  display: flex; align-items: flex-end;
}
.sheet {
  background: #2a261e; border-radius: 26px 26px 0 0;
  padding: 0 20px 36px; width: 100%;
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
  height: calc(100dvh - 130px);
  overflow-y: auto;
}
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 38px; height: 4px; background: #5e5650; border-radius: 99px; margin: 14px auto 22px; }
.sheet-title { font-size: 17px; font-weight: 500; color: #faf6f0; margin-bottom: 24px; }

/* ── Form fields ── */
.field { margin-bottom: 22px; }
.field-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; color: #9c9288; margin-bottom: 5px; }
.field-input {
  width: 100%; background: #343028;
  border: 1.5px solid #5e5650; border-radius: 12px;
  padding: 14px 16px; font-size: 14px; color: #faf6f0;
  outline: none; font-family: inherit;
  -webkit-appearance: none;
}
.field-input:focus { border-color: #E8622A; }
.field-input::placeholder { color: #9c9288; }
.field-row { display: flex; gap: 10px; }
.field-row .field { flex: 1; }
.serves-row {
  display: flex; align-items: center;
  background: #343028; border: 1.5px solid #5e5650;
  border-radius: 12px; overflow: hidden; height: 52px;
}
.serves-btn {
  width: 44px; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: #E8622A;
  cursor: pointer; user-select: none; flex-shrink: 0;
}
.serves-btn:active { background: #504840; }
.serves-val { flex: 1; text-align: center; font-size: 16px; font-weight: 500; color: #faf6f0; }
.serves-div-v { width: 0.5px; height: 24px; background: #5e5650; }
.submit-btn {
  width: 100%; background: #E8622A; color: #fff;
  font-size: 15px; font-weight: 500;
  padding: 18px; border-radius: 14px;
  text-align: center; cursor: pointer; margin-top: 10px;
  user-select: none; transition: opacity 0.15s;
}
.submit-btn:active { opacity: 0.8; }

/* ── Emoji picker ── */
.emoji-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  background: #343028;
  border: 1.5px solid #5e5650;
  border-radius: 12px;
  padding: 10px 8px;
  max-height: 160px;
  overflow-y: auto;
}
.emoji-opt {
  font-size: 22px; line-height: 1;
  text-align: center; padding: 4px 0;
  border-radius: 8px; cursor: pointer;
  transition: background 0.1s;
}
.emoji-opt:active { background: #5e5650; }
.emoji-opt.selected { background: #3d2010; }
.picker-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 0; border-bottom: 0.5px solid #504840;
  cursor: pointer; transition: opacity 0.15s;
}
.picker-item:last-child { border-bottom: none; }
.picker-item:active { opacity: 0.6; }
.picker-emoji { font-size: 24px; line-height: 1; }
.picker-info { flex: 1; }
.picker-name { font-size: 14px; font-weight: 500; color: #faf6f0; }
.picker-serves { font-size: 11px; color: #9c9288; margin-top: 1px; }
.picker-arrow { font-size: 18px; color: #5e5650; }
.picker-empty { font-size: 13px; color: #9c9288; text-align: center; padding: 20px 0; }

/* ── Prompt overlay ── */
.prompt-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.65);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.prompt-box {
  background: #2a261e; border-radius: 20px;
  border: 0.5px solid #5e5650;
  padding: 24px 20px 20px; width: 100%;
}
.prompt-title { font-size: 16px; font-weight: 500; color: #faf6f0; text-align: center; margin-bottom: 5px; }
.prompt-sub { font-size: 13px; color: #9c9288; text-align: center; margin-bottom: 20px; }
.prompt-btns { display: flex; gap: 8px; }
.prompt-btn {
  flex: 1; padding: 13px; border-radius: 12px;
  font-size: 14px; font-weight: 500; text-align: center;
  cursor: pointer; user-select: none; transition: opacity 0.15s;
}
.prompt-btn:active { opacity: 0.75; }
.prompt-btn.primary { background: #E8622A; color: #fff; }
.prompt-btn.secondary { background: #343028; color: #ede4d8; }
.prompt-btn.danger { background: #2a1a15; color: #E8622A; }
.prompt-checkbox {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 16px; font-size: 12px; color: #9c9288; cursor: pointer;
}
.prompt-checkbox input { width: 16px; height: 16px; accent-color: #E8622A; cursor: pointer; flex-shrink: 0; }

/* ── Dropdown menu ── */
.menu-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  z-index: 100;
}
.menu-dropdown {
  position: absolute; top: 76px; right: 16px;
  background: #2a261e; border-radius: 14px;
  border: 0.5px solid #5e5650; overflow: hidden;
  min-width: 210px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}
.menu-item {
  padding: 14px 16px; font-size: 13px; color: #ede4d8;
  cursor: pointer; border-bottom: 0.5px solid #504840;
  transition: background 0.1s;
}
.menu-item:last-child { border-bottom: none; }
.menu-item:active { background: #343028; }
.menu-item.danger { color: #E8622A; }
.menu-item.disabled { color: #5e5650; cursor: default; }
</style>
</head>
<body>

<div class="screen" id="screen">

    <div class="app-header">
      <div class="header-row">
        <div>
          <div class="app-title">For Fork's Sake</div>
          <div class="week-label" id="weekLabel"></div>
        </div>
        <div class="header-right">
          <div class="nav-pill">
            <div class="pill-btn" id="btnPrev">
              <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
            </div>
            <div class="pill-divider"></div>
            <div class="pill-btn" id="btnNext">
              <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
          </div>
          <div class="more-btn" id="btnMore">···</div>
        </div>
      </div>
    </div>
    <div class="planner-body">
      <div class="week-row row-top" id="rowTop"></div>
      <div class="divider-line"></div>
      <div class="week-row row-bottom" id="rowBottom"></div>
    </div>
    <div class="pool-section">
      <div class="pool-header">
        <div class="pool-title">Fridge Pool</div>
        <div class="pool-add" id="btnPoolAdd">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      </div>
      <div class="pool-scroll-wrap">
        <div class="pool-scroll" id="poolScroll"></div>
      </div>
      <div class="pool-dots" id="poolDots"></div>
    </div>

</div>

<script>
// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const S = {
  meals: [],       // [{id, name, emoji, totalServes}]
  slots: {},       // {"YYYY-MM-DD-type": {mealId, isStale}}
  weekOffset: 0,
  suppressPrompt: false,
  lastOpenedDate: null
};

const TYPES = ['brekky', 'lunch', 'dinner'];
const DAYS  = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

// ─────────────────────────────────────────────
// PERSISTENCE
// ─────────────────────────────────────────────
function save() {
  try {
    localStorage.setItem('mpp_v1', JSON.stringify({
      meals: S.meals,
      slots: S.slots,
      suppressPrompt: S.suppressPrompt,
      lastOpenedDate: S.lastOpenedDate
    }));
  } catch(e) {}
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem('mpp_v1') || 'null');
    if (d) {
      S.meals = d.meals || [];
      S.slots = d.slots || {};
      S.suppressPrompt = d.suppressPrompt || false;
      S.lastOpenedDate = d.lastOpenedDate || null;
    }
  } catch(e) {}
}

// ─────────────────────────────────────────────
// DATE UTILS
// ─────────────────────────────────────────────
function getMonday(offset) {
  const now = new Date();
  const day = now.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const mon = new Date(now);
  mon.setDate(now.getDate() + diff + offset * 7);
  mon.setHours(0,0,0,0);
  return mon;
}

function addDays(date, n) {
  const d = new Date(date);
  d.setDate(d.getDate() + n);
  return d;
}

function toStr(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function todayStr() {
  return toStr(new Date());
}

function slotKey(dateStr, type) {
  return `${dateStr}-${type}`;
}

function dateFromKey(key) {
  return key.slice(0, 10);
}

function weekLabel(mon) {
  const sun = addDays(mon, 6);
  const fmt = d => d.toLocaleDateString('en-AU', {month:'short', day:'numeric'});
  return `${fmt(mon)} – ${fmt(sun)}, ${sun.getFullYear()}`;
}

// ─────────────────────────────────────────────
// POOL UTILS
// ─────────────────────────────────────────────
function assignedCount(mealId) {
  return Object.values(S.slots).filter(s => s.mealId === mealId).length;
}

function unassignedCount(mealId) {
  const m = S.meals.find(m => m.id === mealId);
  if (!m) return 0;
  return Math.max(0, m.totalServes - assignedCount(mealId));
}

function poolMeals() {
  return S.meals.filter(m => unassignedCount(m.id) > 0);
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

// ─────────────────────────────────────────────
// STALE CHECK
// ─────────────────────────────────────────────
function checkStale() {
  const today = todayStr();
  Object.keys(S.slots).forEach(key => {
    const d = dateFromKey(key);
    if (d < today && S.slots[key].mealId) {
      S.slots[key].isStale = true;
    }
  });
  S.lastOpenedDate = today;
  save();
}


// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function render() {
  // Clamp offset
  S.weekOffset = Math.max(0, Math.min(3, S.weekOffset));
  document.getElementById('btnPrev').classList.toggle('disabled', S.weekOffset === 0);
  document.getElementById('btnNext').classList.toggle('disabled', S.weekOffset === 3);
  renderWeekLabel();
  renderGrid();
  renderPool();
}

function renderWeekLabel() {
  document.getElementById('weekLabel').textContent = weekLabel(getMonday(S.weekOffset));
}

function renderGrid() {
  const mon = getMonday(S.weekOffset);
  const today = todayStr();
  const top = document.getElementById('rowTop');
  const bot = document.getElementById('rowBottom');
  top.innerHTML = '';
  bot.innerHTML = '';

  for (let i = 0; i < 7; i++) {
    const date = addDays(mon, i);
    const dateStr = toStr(date);
    const isToday = dateStr === today;

    const col = document.createElement('div');
    col.className = 'day-col';

    // Day header
    const head = document.createElement('div');
    head.className = 'day-head' + (isToday ? ' today' : '');
    head.innerHTML = `<div class="day-lbl">${DAYS[i]}</div><div class="day-num">${date.getDate()}</div>`;
    col.appendChild(head);

    // Slots
    TYPES.forEach(type => {
      const key = slotKey(dateStr, type);
      const slotData = S.slots[key];
      const meal = slotData?.mealId ? S.meals.find(m => m.id === slotData.mealId) : null;
      const stale = !!(slotData?.isStale && meal);

      const el = document.createElement('div');

      if (meal) {
        el.className = `slot filled-${type}${stale ? ' stale' : ''}`;
        el.innerHTML = `
          <div class="slot-type">${type}</div>
          <div class="slot-emoji">${meal.emoji}</div>
          <div class="slot-name">${meal.name}</div>`;

        // Tap stale → ate it?
        el.addEventListener('click', () => {
          if (stale) showStalePrompt(key, meal);
        });
        // Long press → clear prompt
        longPress(el, () => showClearPrompt(key));
      } else {
        el.className = 'slot empty';
        el.innerHTML = `<div class="empty-plus">+</div>`;
        el.addEventListener('click', () => showPicker(key, type));
      }

      col.appendChild(el);
    });

    (i < 4 ? top : bot).appendChild(col);
  }
}

function renderPool() {
  const scroll = document.getElementById('poolScroll');
  const dots   = document.getElementById('poolDots');
  scroll.innerHTML = '';
  dots.innerHTML   = '';

  const available = poolMeals();

  if (available.length === 0) {
    const msg = document.createElement('div');
    msg.className = 'pool-empty-msg';
    msg.textContent = 'What\'s on the menu? — tap + to add';
    scroll.appendChild(msg);
    return;
  }

  // Build pages of 5
  const pages = [];
  for (let i = 0; i < available.length; i += 5) pages.push(available.slice(i, i+5));

  pages.forEach((page, pi) => {
    const pageEl = document.createElement('div');
    pageEl.className = 'pool-page';

    // Pad to 5
    const padded = [...page];
    while (padded.length < 5) padded.push(null);

    padded.forEach(meal => {
      const item = document.createElement('div');
      if (!meal) {
        item.className = 'pool-item phantom';
      } else {
        item.className = 'pool-item';
        item.innerHTML = `
          <div class="pool-emoji">${meal.emoji}</div>
          <div class="pool-name">${meal.name}</div>
          <div class="pool-serves">${unassignedCount(meal.id)} left</div>`;
        longPress(item, () => showPoolRemove(meal));
      }
      pageEl.appendChild(item);
    });

    scroll.appendChild(pageEl);

    // Dot
    const dot = document.createElement('div');
    dot.className = 'dot' + (pi === 0 ? ' active' : '');
    dots.appendChild(dot);
  });

  if (pages.length <= 1) dots.style.visibility = 'hidden';
  else dots.style.visibility = '';
}

// ─────────────────────────────────────────────
// POOL SCROLL DOTS (set up once)
// ─────────────────────────────────────────────
document.getElementById('poolScroll').addEventListener('scroll', function() {
  const w = this.offsetWidth;
  if (!w) return;
  const page = Math.round(this.scrollLeft / w);
  document.querySelectorAll('#poolDots .dot').forEach((d,i) => {
    d.classList.toggle('active', i === page);
  });
}, { passive: true });

// ─────────────────────────────────────────────
// LONG PRESS
// ─────────────────────────────────────────────
function longPress(el, cb) {
  let timer = null;
  let moved = false;

  const start = () => { moved = false; timer = setTimeout(() => { if (!moved) cb(); }, 550); };
  const cancel = () => clearTimeout(timer);
  const move = () => { moved = true; clearTimeout(timer); };

  el.addEventListener('touchstart', start, { passive: true });
  el.addEventListener('touchmove', move, { passive: true });
  el.addEventListener('touchend', cancel);
  el.addEventListener('touchcancel', cancel);
  el.addEventListener('mousedown', start);
  el.addEventListener('mousemove', move);
  el.addEventListener('mouseup', cancel);
  el.addEventListener('mouseleave', cancel);
}

// ─────────────────────────────────────────────
// OVERLAY HELPERS
// ─────────────────────────────────────────────
function getScreen() { return document.getElementById('screen'); }

function closeOverlay() {
  const o = document.getElementById('overlay');
  if (o) o.remove();
}

function sheetOverlay(html, onReady) {
  closeOverlay();
  const o = document.createElement('div');
  o.id = 'overlay';
  o.className = 'sheet-overlay';
  o.innerHTML = `<div class="sheet" id="sheet">${html}</div>`;
  getScreen().appendChild(o);
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.getElementById('sheet').classList.add('open');
  }));
  o.addEventListener('click', e => { if (e.target === o) closeOverlay(); });
  if (onReady) onReady();
}

function promptOverlay(html, onReady) {
  closeOverlay();
  const o = document.createElement('div');
  o.id = 'overlay';
  o.className = 'prompt-overlay';
  o.innerHTML = `<div class="prompt-box">${html}</div>`;
  getScreen().appendChild(o);
  if (onReady) onReady();
}

function menuOverlay(html, onReady) {
  closeOverlay();
  const o = document.createElement('div');
  o.id = 'overlay';
  o.className = 'menu-overlay';
  o.innerHTML = html;
  getScreen().appendChild(o);
  o.addEventListener('click', e => { if (e.target === o) closeOverlay(); });
  if (onReady) onReady();
}

// ─────────────────────────────────────────────
// ADD MEAL SHEET
// ─────────────────────────────────────────────
const FOOD_EMOJIS = [
  '🍛','🍝','🍜','🍲','🥘','🫕','🍱','🥗',
  '🌮','🌯','🥙','🫔','🍔','🍟','🌭','🥪',
  '🍣','🍤','🐟','🦐','🦑','🦞','🦀','🍗',
  '🥩','🍖','🥓','🍳','🥚','🧆','🧇','🥞',
  '🥣','🍚','🍙','🍘','🥟','🫙','🍠','🥕',
  '🥦','🥬','🥑','🍅','🫛','🫚','🧀','🥨',
  '🍞','🥐','🫓','🥖','🥯','🧁','🍰','🎂'
];

function showAddMeal() {
  let serves = 0;
  let selectedEmoji = '🍽️';

  const gridHtml = FOOD_EMOJIS.map((e, i) =>
    `<div class="emoji-opt${i === 0 ? '' : ''}" data-emoji="${e}">${e}</div>`
  ).join('');

  sheetOverlay(`
    <div class="sheet-handle"></div>
    <div class="sheet-title">Add a meal to the Fridge Pool</div>
    <div class="field">
      <div class="field-label">Meal name</div>
      <input id="fldName" class="field-input" type="text" placeholder="e.g. Thai curry" autocomplete="off" autocorrect="off">
    </div>
    <div class="field">
      <div class="field-label">Emoji</div>
      <div class="emoji-grid" id="emojiGrid">${gridHtml}</div>
    </div>
    <div class="field">
      <div class="field-label">Serves</div>
      <div class="serves-row">
        <div class="serves-btn" id="btnMinus">−</div>
        <div class="serves-div-v"></div>
        <div class="serves-val" id="servesVal">0</div>
        <div class="serves-div-v"></div>
        <div class="serves-btn" id="btnPlus">+</div>
      </div>
    </div>
    <div class="submit-btn" id="btnSubmit">Add to fridge</div>
  `, () => {
    // Highlight first emoji by default
    const firstOpt = document.querySelector('.emoji-opt');
    if (firstOpt) { firstOpt.classList.add('selected'); selectedEmoji = firstOpt.dataset.emoji; }

    document.querySelectorAll('.emoji-opt').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.emoji-opt').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        selectedEmoji = el.dataset.emoji;
      });
    });

    document.getElementById('btnMinus').addEventListener('click', () => {
      if (serves > 1) { serves--; document.getElementById('servesVal').textContent = serves; }
    });
    document.getElementById('btnPlus').addEventListener('click', () => {
      if (serves < 20) { serves++; document.getElementById('servesVal').textContent = serves; }
    });
    document.getElementById('btnSubmit').addEventListener('click', () => {
      const name = document.getElementById('fldName').value.trim();
      if (!name) { document.getElementById('fldName').focus(); return; }
      if (serves < 1) { return; }
      S.meals.push({ id: uid(), name, emoji: selectedEmoji, totalServes: serves });
      save();
      closeOverlay();
      renderPool();
    });
  });
}

// ─────────────────────────────────────────────
// PICKER SHEET
// ─────────────────────────────────────────────
function showPicker(key, type) {
  const available = poolMeals();
  const label = type.charAt(0).toUpperCase() + type.slice(1);

  if (available.length === 0) {
    promptOverlay(`
      <div class="prompt-title">Nothing in the fridge</div>
      <div class="prompt-sub">Add meals using the + button first.</div>
      <div class="prompt-btns">
        <div class="prompt-btn primary" id="btnOk">OK</div>
      </div>
    `, () => {
      document.getElementById('btnOk').addEventListener('click', closeOverlay);
    });
    return;
  }

  const items = available.map(m => `
    <div class="picker-item" data-id="${m.id}">
      <div class="picker-emoji">${m.emoji}</div>
      <div class="picker-info">
        <div class="picker-name">${m.name}</div>
        <div class="picker-serves">${unassignedCount(m.id)} serve${unassignedCount(m.id) !== 1 ? 's' : ''} available</div>
      </div>
      <div class="picker-arrow">›</div>
    </div>
  `).join('');

  sheetOverlay(`
    <div class="sheet-handle"></div>
    <div class="sheet-title">Pick a ${label}</div>
    ${items}
  `, () => {
    document.querySelectorAll('.picker-item').forEach(el => {
      el.addEventListener('click', () => {
        const mealId = el.dataset.id;
        if (!S.slots[key]) S.slots[key] = {};
        S.slots[key].mealId = mealId;
        S.slots[key].isStale = false;
        save();
        closeOverlay();
        render();
      });
    });
  });
}

// ─────────────────────────────────────────────
// STALE PROMPT
// ─────────────────────────────────────────────
function showStalePrompt(key, meal) {
  promptOverlay(`
    <div class="prompt-title">Did you eat this?</div>
    <div class="prompt-sub">${meal.emoji} ${meal.name}</div>
    <div class="prompt-btns">
      <div class="prompt-btn secondary" id="btnNotEaten">Not eaten</div>
      <div class="prompt-btn primary" id="btnEaten">Eaten</div>
    </div>
  `, () => {
    // Eaten: clear slot + reduce totalServes (serve is consumed)
    document.getElementById('btnEaten').addEventListener('click', () => {
      const m = S.meals.find(m => m.id === meal.id);
      if (m) {
        m.totalServes = Math.max(0, m.totalServes - 1);
        if (m.totalServes === 0) {
          // Remove meal and any remaining slot refs
          S.meals = S.meals.filter(x => x.id !== m.id);
          Object.keys(S.slots).forEach(k => {
            if (S.slots[k].mealId === m.id) delete S.slots[k];
          });
        }
      }
      delete S.slots[key];
      save(); closeOverlay(); render();
    });

    // Not eaten: clear slot only — unassigned count rises, meal back in pool
    document.getElementById('btnNotEaten').addEventListener('click', () => {
      delete S.slots[key];
      save(); closeOverlay(); render();
    });
  });
}

// ─────────────────────────────────────────────
// CLEAR PROMPT (long press)
// ─────────────────────────────────────────────
function showClearPrompt(key) {
  if (S.suppressPrompt) {
    // Skip prompt — serve goes back to pool
    delete S.slots[key];
    save(); render();
    return;
  }

  let dontShow = false;

  promptOverlay(`
    <div class="prompt-title">Clear this meal?</div>
    <div class="prompt-sub">It'll go back into your fridge.</div>
    <label class="prompt-checkbox">
      <input type="checkbox" id="chkDontShow">
      Don't show this again
    </label>
    <div class="prompt-btns">
      <div class="prompt-btn secondary" id="btnCancelClear">Cancel</div>
      <div class="prompt-btn danger" id="btnConfirmClear">Clear</div>
    </div>
  `, () => {
    document.getElementById('chkDontShow').addEventListener('change', e => {
      dontShow = e.target.checked;
    });
    document.getElementById('btnCancelClear').addEventListener('click', closeOverlay);
    document.getElementById('btnConfirmClear').addEventListener('click', () => {
      if (dontShow) { S.suppressPrompt = true; }
      delete S.slots[key];
      save(); closeOverlay(); render();
    });
  });
}

// ─────────────────────────────────────────────
// POOL REMOVE (long press pool item)
// ─────────────────────────────────────────────
function showPoolRemove(meal) {
  promptOverlay(`
    <div class="prompt-title">Remove from fridge?</div>
    <div class="prompt-sub">${meal.emoji} ${meal.name} will be removed entirely.</div>
    <div class="prompt-btns">
      <div class="prompt-btn secondary" id="btnCancelRemove">Cancel</div>
      <div class="prompt-btn danger" id="btnConfirmRemove">Remove</div>
    </div>
  `, () => {
    document.getElementById('btnCancelRemove').addEventListener('click', closeOverlay);
    document.getElementById('btnConfirmRemove').addEventListener('click', () => {
      Object.keys(S.slots).forEach(k => {
        if (S.slots[k].mealId === meal.id) delete S.slots[k];
      });
      S.meals = S.meals.filter(m => m.id !== meal.id);
      save(); closeOverlay(); render();
    });
  });
}

// ─────────────────────────────────────────────
// ··· MENU
// ─────────────────────────────────────────────
function showMenu() {
  const promptLabel = S.suppressPrompt
    ? 'Reset long press prompt'
    : '<span style="color:#bbb">Reset long press prompt</span>';

  menuOverlay(`
    <div class="menu-dropdown">
      <div class="menu-item" id="mReset">${S.suppressPrompt ? 'Reset long press prompt' : '<span style="color:#bbb">Reset long press prompt</span>'}</div>
      <div class="menu-item danger" id="mClearWeek">Clear this week</div>
      <div class="menu-item danger" id="mResetPool">Reset fridge pool</div>
    </div>
  `, () => {
    document.getElementById('mReset').addEventListener('click', () => {
      if (!S.suppressPrompt) return;
      S.suppressPrompt = false;
      save(); closeOverlay();
    });

    document.getElementById('mClearWeek').addEventListener('click', () => {
      closeOverlay();
      promptOverlay(`
        <div class="prompt-title">Clear this week?</div>
        <div class="prompt-sub">All meals go back to the fridge.</div>
        <div class="prompt-btns">
          <div class="prompt-btn secondary" id="btnCancelWeek">Cancel</div>
          <div class="prompt-btn danger" id="btnConfirmWeek">Clear week</div>
        </div>
      `, () => {
        document.getElementById('btnCancelWeek').addEventListener('click', closeOverlay);
        document.getElementById('btnConfirmWeek').addEventListener('click', () => {
          const mon = getMonday(S.weekOffset);
          for (let i = 0; i < 7; i++) {
            const d = toStr(addDays(mon, i));
            TYPES.forEach(t => delete S.slots[slotKey(d, t)]);
          }
          save(); closeOverlay(); render();
        });
      });
    });

    document.getElementById('mResetPool').addEventListener('click', () => {
      closeOverlay();
      promptOverlay(`
        <div class="prompt-title">Reset fridge pool?</div>
        <div class="prompt-sub">All meals and assignments will be removed.</div>
        <div class="prompt-btns">
          <div class="prompt-btn secondary" id="btnCancelPool">Cancel</div>
          <div class="prompt-btn danger" id="btnConfirmPool">Reset</div>
        </div>
      `, () => {
        document.getElementById('btnCancelPool').addEventListener('click', closeOverlay);
        document.getElementById('btnConfirmPool').addEventListener('click', () => {
          S.meals = [];
          S.slots = {};
          save(); closeOverlay(); render();
        });
      });
    });
  });
}

// ─────────────────────────────────────────────
// EVENT LISTENERS
// ─────────────────────────────────────────────
document.getElementById('btnPrev').addEventListener('click', () => { S.weekOffset--; render(); });
document.getElementById('btnNext').addEventListener('click', () => { S.weekOffset++; render(); });
document.getElementById('btnPoolAdd').addEventListener('click', showAddMeal);
document.getElementById('btnMore').addEventListener('click', showMenu);

// ─────────────────────────────────────────────
// CLEAN OLD WEEKS
// ─────────────────────────────────────────────
function cleanOldSlots() {
  const cutoff = toStr(getMonday(0));
  Object.keys(S.slots).forEach(key => {
    if (dateFromKey(key) < cutoff) delete S.slots[key];
  });
}

// ─────────────────────────────────────────────
load();
cleanOldSlots();
checkStale();
render();
</script>
